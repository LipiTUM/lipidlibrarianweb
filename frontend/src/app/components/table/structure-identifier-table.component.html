<form>
  <div class="mb-3 row">
    <label for="table-complete-search" class="col-xs-3 col-sm-auto col-form-label">Full text search:</label>
    <div class="col-xs-3 col-sm-auto">
      <input
        id="table-complete-search"
        type="text"
        class="form-control"
        name="searchTerm"
        [(ngModel)]="service.searchTerm"
      />
    </div>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th scope="col" structureIdentifierSortableAttribute="value" (sort)="onSort($event)">Value</th>
        <th scope="col" structureIdentifierSortableAttribute="structure_type" (sort)="onSort($event)">Type</th>
        <th scope="col">Sources</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let structureIdentifier of structureIdentifiers$ | async">
        <td><ngb-highlight [result]="structureIdentifier.value" [term]="service.searchTerm"></ngb-highlight></td>
        <td><ngb-highlight [result]="structureIdentifier.structure_type" [term]="service.searchTerm"></ngb-highlight></td>
        <td>
          <div class="d-flex flex-wrap gap-1">
            <span *ngFor="let src of structureIdentifier.sources"
                  class="source-chip source-chip--sm"
                  title="{{ formatSourceName(src.source) }}: {{ src.lipid_level }} · {{ src.lipid_name }}">
              {{ formatSourceName(src.source) }}
            </span>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="d-flex justify-content-between p-2">
    <ngb-pagination [collectionSize]="(total$ | async)!" [(page)]="service.page" [pageSize]="service.pageSize"></ngb-pagination>

    <select class="form-select" style="width: auto" name="pageSize" [(ngModel)]="service.pageSize">
      <option [ngValue]="5">5 items per page</option>
      <option [ngValue]="10">10 items per page</option>
      <option [ngValue]="50">50 items per page</option>
    </select>
  </div>
</form>
